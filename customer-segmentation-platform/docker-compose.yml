services:
  api:
    build: .
    ports: ["8002:8002"]
    environment:
      APP_ENV: prod
      DATABASE_URL: postgresql+psycopg2://segment:segment@db:5432/segmentation
    depends_on: {db: {condition: service_healthy}}
  db:
    image: postgres:16-alpine
    environment: {POSTGRES_USER: segment, POSTGRES_PASSWORD: segment, POSTGRES_DB: segmentation}
    healthcheck: {test: ["CMD-SHELL", "pg_isready -U segment -d segmentation"], interval: 5s, retries: 10}
volumes: {segment_pg_data: {}}
